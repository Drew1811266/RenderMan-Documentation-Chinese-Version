<p /><span class="confluence-embedded-file-wrapper image-center-wrapper confluence-embedded-manual-size"><img class="confluence-embedded-image image-center" alt="PxrCamera_base.1.jpg" width="1280" loading="lazy" src="../../attachments/542231763/PxrCamera_base.1.jpg" data-image-src="../../attachments/542231763/PxrCamera_base.1.jpg" data-height="720" data-width="1280" data-unresolved-comment-count="0" data-linked-resource-id="542231775" data-linked-resource-version="1" data-linked-resource-type="attachment" data-linked-resource-default-alias="PxrCamera_base.1.jpg" data-base-url="https://renderman.atlassian.net/wiki" data-linked-resource-content-type="image/jpeg" data-linked-resource-container-id="542231763" data-linked-resource-container-version="1" data-media-id="f68e1592-760f-475d-a835-fd0a71ff2f3a" data-media-type="file"></span><p /><p><strong>自然</strong></p><p>自然暗角。当值为 1 时，偏离主摄影机轴线的方向会按真实方式变暗。广角透视会更强烈地呈现此效果。设置为 0 会禁用此效果，中间值会相应混合。</p><p /><span class="confluence-embedded-file-wrapper image-center-wrapper confluence-embedded-manual-size"><img class="confluence-embedded-image image-center" alt="PxrCamera_base.gif" width="1280" loading="lazy" src="../../attachments/542231763/PxrCamera_base.gif" data-image-src="../../attachments/542231763/PxrCamera_base.gif" data-height="720" data-width="1280" data-unresolved-comment-count="0" data-linked-resource-id="542231778" data-linked-resource-version="1" data-linked-resource-type="attachment" data-linked-resource-default-alias="PxrCamera_base.gif" data-base-url="https://renderman.atlassian.net/wiki" data-linked-resource-content-type="image/gif" data-linked-resource-container-id="542231763" data-linked-resource-container-version="1" data-media-id="b33b911d-f60a-4ced-8941-312da772de8a" data-media-type="file"></span><p /><p><strong>光学</strong></p><p>光学暗角。模拟由遮光罩或其他额外镜头元件造成的光线遮挡。启用 depth of field（景深）时，这会产生猫眼 bokeh（散景）。不过，它也会增加图像噪声。</p><p><br/></p><span class="confluence-embedded-file-wrapper image-center-wrapper confluence-embedded-manual-size"><img class="confluence-embedded-image image-center" alt="OpticalVignetter.gif" width="1280" loading="lazy" src="../../attachments/542231763/OpticalVignetter.gif" data-image-src="../../attachments/542231763/OpticalVignetter.gif" data-height="720" data-width="1280" data-unresolved-comment-count="0" data-linked-resource-id="542231781" data-linked-resource-version="1" data-linked-resource-type="attachment" data-linked-resource-default-alias="OpticalVignetter.gif" data-base-url="https://renderman.atlassian.net/wiki" data-linked-resource-content-type="image/gif" data-linked-resource-container-id="542231763" data-linked-resource-container-version="1" data-media-id="6e96a182-fc38-4d34-adae-50913bf8187f" data-media-type="file"></span><p />
