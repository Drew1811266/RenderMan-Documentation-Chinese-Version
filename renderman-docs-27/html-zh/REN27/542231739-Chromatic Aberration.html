<span class="confluence-embedded-file-wrapper image-left-wrapper confluence-embedded-manual-size"><img class="confluence-embedded-image image-left" width="900" loading="lazy" src="../../attachments/542231739/PxrCamera_Abberation.jpg" data-image-src="../../attachments/542231739/PxrCamera_Abberation.jpg" data-height="720" data-width="1280" data-unresolved-comment-count="0" data-linked-resource-id="542231751" data-linked-resource-version="1" data-linked-resource-type="attachment" data-linked-resource-default-alias="PxrCamera_Abberation.jpg" data-base-url="https://renderman.atlassian.net/wiki" data-linked-resource-content-type="image/jpeg" data-linked-resource-container-id="542231739" data-linked-resource-container-version="1" data-media-id="e140ef80-7c7f-4c04-8354-312086d18cbe" data-media-type="file"></span><p><strong>横向</strong></p><p>横向（或侧向）色差。此项分别指定红、绿、蓝三原色的放大倍率。当这些值不相等时，会产生一种色偏，并且在图像边缘最为明显。不过，它也会增加彩色噪声。</p><p><strong>轴向</strong></p><p>轴向（或纵向）色差。此项分别指定红、绿、蓝三原色的色彩焦点偏移。当这些值不相等时，会在散景和失焦物体上产生色偏。不过，它也会增加彩色噪声。</p>
