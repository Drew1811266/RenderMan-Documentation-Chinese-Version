<p>PxrShadedSide 是一个 OSL pattern，用于告诉我们当前正在着色的是哪一侧。对于具有两个面的对象，这很有用，因为我们可以为对象的每一侧分配不同颜色。</p><h3 id="PxrShadedSide-Parameters">参数</h3><h4 id="PxrShadedSide-Invert">Invert</h4><p>如果我们想要的侧面位于相反侧，请启用此参数来反转它。</p><h3 id="PxrShadedSide-Example">示例</h3><p><span class="confluence-embedded-file-wrapper image-center-wrapper"><img class="confluence-embedded-image image-center" loading="lazy" src="../../attachments/542224902/shadedside.png" data-image-src="../../attachments/542224902/shadedside.png" data-unresolved-comment-count="0" data-linked-resource-id="542224914" data-linked-resource-version="1" data-linked-resource-type="attachment" data-linked-resource-default-alias="shadedside.png" data-base-url="https://renderman.atlassian.net/wiki" data-linked-resource-content-type="image/png" data-linked-resource-container-id="542224902" data-linked-resource-container-version="1" data-media-id="fd591e53-8bc3-44a6-b275-1e6d7d88cfeb" data-media-type="file"></span></p><p style="text-align: center;"><em>PxrShadedSide 与 PxrMix 配合用于 Diffuse Color</em></p>
