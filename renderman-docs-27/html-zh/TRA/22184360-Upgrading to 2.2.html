<div class="section"><h3 id="Upgradingto2.2-DownTime">停机时间</h3><p>升级作业数据库所需的时间取决于数据库中现有作业的数量，以及主机的 CPU 和 I/O 速度。在我们的测试中，一个包含 700,000 个作业的作业数据库在 2 分钟内完成升级；该主机配备 2.8GHz CPU 和 7200 RPM HDD。</p><p> </p></div><div class="section"><h3 id="Upgradingto2.2-Other">其他</h3><p>请参阅以下页面中描述的标准升级说明： <a href="22184348-Upgrading.html" data-linked-resource-id="22184348" data-linked-resource-version="4" data-linked-resource-type="page">升级</a>。</p></div>
