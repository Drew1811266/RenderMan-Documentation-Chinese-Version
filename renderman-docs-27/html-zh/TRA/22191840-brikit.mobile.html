<h1 id="id-.brikit.mobile-ParentPageforMobilePages">移动页面的父页面</h1>
<p>为了帮助你组织移动页面，我们创建了一个页面层级，将它们与桌面页面分开。</p>
<p>你在 Theme Press 1.2 或更高版本中创建的移动页面会嵌套在此页面下。因此，每个包含移动页面的空间都会有一个 <code>.brikit.mobile</code> 页面。</p>
<p>如果你在此空间中使用 1.2 之前创建过移动页面，可能需要将它们移动到此页面下。</p>
